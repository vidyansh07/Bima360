# Alembic configuration for Bima360
# Run from workspace root: alembic -c backend/alembic.ini upgrade head

[alembic]
script_location = backend/alembic
prepend_sys_path = .

# sqlalchemy.url is set in env.py from settings — placeholder only
sqlalchemy.url = postgresql+asyncpg://bima360:bima360pass@localhost:5432/bima360

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: Build (validates next.config.ts + tailwind compilation)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL:                 http://localhost:8000
          NEXT_PUBLIC_COGNITO_AGENT_POOL_ID:   us-east-1_placeholder
          NEXT_PUBLIC_COGNITO_AGENT_CLIENT_ID: placeholder
          NEXT_PUBLIC_RAZORPAY_KEY_ID:         rzp_placeholder

  deploy:
    name: Deploy to Amplify
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Trigger Amplify deployment
        run: |
          aws amplify start-job \
            --app-id  ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-type RELEASE
